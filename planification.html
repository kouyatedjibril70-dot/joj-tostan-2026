<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JO'TALI × Tostan 2026 — Planification & Suivi</title>
  <link rel="stylesheet" href="css/style.css"/>

  <style>
  body{
    background: linear-gradient(160deg, #0a0e1a 0%, var(--forest2) 55%, var(--forest) 140%);
  }

  .suivi-page{
    font-family:'Segoe UI',system-ui,sans-serif;
    padding-bottom: 60px;
  }

  /* Sous-onglets */
  .sub-tabs{ display:flex; gap:8px; padding:20px 24px 0; max-width:980px; margin:0 auto; }
  .sub-tab-btn{
    background:transparent; border:1.5px solid rgba(243,156,18,.25); border-bottom:none;
    color:#a9c2b4; padding:11px 22px; border-radius:14px 14px 0 0;
    font-size:.85rem; font-weight:700; cursor:pointer; transition:background .2s,color .2s,border-color .2s;
  }
  .sub-tab-btn:hover{ color:#fff; }
  .sub-tab-btn.active{ background:rgba(243,156,18,.1); color:#fff; border-color:var(--gold); }
  .sub-tabs-hub-link{
    margin-left:auto; align-self:center; text-decoration:none;
    color:#a9c2b4; font-size:.78rem; font-weight:700;
    padding:8px 18px; border-radius:20px; border:1.5px solid rgba(255,255,255,.18);
    transition:border-color .2s,color .2s;
  }
  .sub-tabs-hub-link:hover{ border-color:var(--gold); color:#fff; }

  .sub-tab-content{ display:none; max-width:980px; margin:0 auto; padding:32px 24px; }
  .sub-tab-content.active{ display:block; }

  /* Barre de progression globale */
  .suivi-progress-wrap{ margin-bottom:26px; }
  .suivi-progress-label{ color:#fff; font-size:.95rem; font-weight:700; }
  .suivi-progress-count{ color:#8fae9c; font-weight:400; font-size:.8rem; margin-left:6px; }
  .suivi-progress-bar{
    margin-top:10px; height:10px; border-radius:6px;
    background:rgba(255,255,255,.08); overflow:hidden;
  }
  .suivi-progress-fill{
    height:100%; border-radius:6px; width:0%;
    background:linear-gradient(90deg,var(--gold2),var(--gold));
    transition:width .5s ease;
  }

  /* KPI cards */
  .suivi-kpis{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
    gap:12px; margin-bottom:26px;
  }
  .suivi-kpi-card{
    text-align:center; padding:16px 10px; border-radius:12px;
    background:rgba(255,255,255,.03); border:1.5px solid;
  }
  .suivi-kpi-val{ font-size:1.5rem; font-weight:800; }
  .suivi-kpi-label{ margin-top:4px; font-size:.7rem; color:#a9c2b4; text-transform:uppercase; letter-spacing:.05em; }

  /* Filtres */
  .suivi-filters{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:26px; }
  .suivi-select{
    background:rgba(255,255,255,.05); border:1.5px solid rgba(255,255,255,.18);
    color:#fff; padding:8px 14px; border-radius:20px; font-size:.8rem; cursor:pointer;
  }
  .suivi-select:focus{ outline:none; border-color:var(--gold); }
  .suivi-select option{ background:#12201a; color:#fff; }

  /* Groupes de phase */
  .pilotage-group{ margin-bottom:32px; }
  .pilotage-group-title{
    color:var(--gold); font-size:.95rem; font-weight:700; margin-bottom:14px;
    display:flex; align-items:center; gap:8px;
  }
  .pilotage-group-count{
    background:rgba(243,156,18,.15); color:var(--gold); font-size:.68rem;
    padding:2px 9px; border-radius:12px; font-weight:700;
  }

  /* Carte activité */
  .pilotage-card{
    display:flex; justify-content:space-between; align-items:flex-start; gap:16px;
    background:rgba(255,255,255,.03); border:1.5px solid rgba(255,255,255,.08);
    border-radius:12px; padding:16px 18px; margin-bottom:10px;
  }
  .pilotage-card-title{ color:#fff; font-size:.9rem; font-weight:700; margin-bottom:8px; line-height:1.4; }
  .pilotage-card-meta{ display:flex; gap:14px; flex-wrap:wrap; font-size:.75rem; color:#a9c2b4; margin-bottom:6px; }
  .pilotage-card-livrable{ font-size:.75rem; color:#8fae9c; font-style:italic; }
  .pilotage-card-side{ flex-shrink:0; }
  .pilotage-statut-select{
    background:rgba(0,0,0,.25); border:1.5px solid; border-radius:20px;
    padding:6px 12px; font-size:.75rem; font-weight:700; cursor:pointer;
  }
  .pilotage-statut-select option{ background:#12201a; color:#fff; }

  .suivi-empty{ text-align:center; color:#8fae9c; padding:40px 0; font-size:.9rem; }

  /* Analyse intelligente du planning */
  .analyse-panel{
    margin-top:36px; padding:26px 28px; border-radius:16px;
    background:rgba(255,255,255,.03); border:1.5px solid rgba(255,255,255,.1);
  }
  .analyse-panel.analyse-bon{ border-color:rgba(39,174,96,.35); }
  .analyse-panel.analyse-attention{ border-color:rgba(243,156,18,.4); }
  .analyse-panel.analyse-alerte{ border-color:rgba(231,76,60,.45); }
  .analyse-header{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .analyse-icon{ font-size:1.2rem; }
  .analyse-title{ color:#fff; font-weight:800; font-size:.95rem; }
  .analyse-status{ margin-left:auto; font-size:.78rem; font-weight:700; color:#a9c2b4; }
  .analyse-text{ font-size:.85rem; line-height:1.85; color:#c9dbd0; margin-bottom:22px; }
  .analyse-text strong{ color:#fff; }
  .analyse-phases{ display:flex; flex-direction:column; gap:10px; }
  .analyse-phase-row{ display:flex; align-items:center; gap:12px; }
  .analyse-phase-name{ width:190px; flex-shrink:0; font-size:.75rem; color:#a9c2b4; }
  .analyse-phase-bar{ flex:1; height:7px; border-radius:4px; background:rgba(255,255,255,.08); overflow:hidden; }
  .analyse-phase-fill{ height:100%; background:linear-gradient(90deg,var(--gold2),var(--gold)); border-radius:4px; }
  .analyse-phase-pct{ width:56px; text-align:right; font-size:.75rem; font-weight:700; color:#fff; }

  @media (max-width:640px){
    .analyse-phase-name{ width:120px; font-size:.68rem; }
    .analyse-status{ margin-left:0; }
  }

  .terrain-empty-state{
    text-align:center; max-width:520px; margin:40px auto; padding:44px 32px;
    background:rgba(243,156,18,.05); border:1.5px solid rgba(243,156,18,.2);
    border-radius:18px;
  }
  .terrain-empty-icon{ font-size:2.4rem; margin-bottom:16px; }
  .terrain-empty-state p{ color:#a9c2b4; font-size:.88rem; line-height:1.75; margin:0; }

  /* Cartes activités terrain */
  .terrain-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
  .terrain-card{
    background:rgba(255,255,255,.03); border:1.5px solid rgba(255,255,255,.08);
    border-radius:14px; padding:18px; display:flex; flex-direction:column; gap:10px;
  }
  .terrain-card-top{ display:flex; gap:8px; flex-wrap:wrap; }
  .terrain-badge{ font-size:.68rem; font-weight:700; padding:3px 10px; border-radius:20px; border:1.5px solid; }
  .terrain-card-title{ color:#fff; font-size:.92rem; font-weight:700; line-height:1.35; }
  .terrain-card-meta{ display:flex; flex-direction:column; gap:4px; font-size:.75rem; color:#a9c2b4; }
  .terrain-card-participants{
    display:flex; gap:20px; padding:8px 0;
    border-top:1px solid rgba(255,255,255,.08); border-bottom:1px solid rgba(255,255,255,.08);
  }
  .tp-stat{ display:flex; flex-direction:column; align-items:center; flex:1; }
  .tp-val{ font-size:1.1rem; font-weight:800; color:#fff; }
  .tp-lbl{ font-size:.65rem; color:#8fae9c; text-transform:uppercase; letter-spacing:.05em; margin-top:2px; }
  .terrain-card-action{ display:flex; gap:8px; }
  .terrain-input{
    width:90px; background:rgba(255,255,255,.05); border:1.5px solid rgba(255,255,255,.18);
    color:#fff; padding:7px 10px; border-radius:8px; font-size:.8rem;
  }
  .terrain-input:focus{ outline:none; border-color:var(--gold); }
  .terrain-btn{
    flex:1; background:var(--gold); color:#0a0e1a; border:none; border-radius:8px;
    padding:7px 12px; font-size:.75rem; font-weight:700; cursor:pointer; transition:opacity .2s;
  }
  .terrain-btn:hover{ opacity:.85; }

  @media (max-width:640px){
    .pilotage-card{ flex-direction:column; }
  }
  </style>
</head>
<body>

<header class="app-header brand-forest">
  <div class="header-brand">
    <div class="olympic-rings">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="ring ring-4"></div>
      <div class="ring ring-5"></div>
    </div>
    <div class="header-title">
      <h1>📋 JO'TALI × Tostan 2026 — Planification & Suivi</h1>
      <p>Pilotage des activités, calendrier, budget & évaluation</p>
    </div>
  </div>
  <nav class="space-switcher">
    <a href="index.html" class="sw-link">🏠 Hub</a>
    <a href="presentation.html" class="sw-link">🎤 Présentation</a>
    <a href="selection.html" class="sw-link">🗺️ Sélection</a>
    <a href="planification.html" class="sw-link sw-active">📋 Planification</a>
  </nav>
</header>

<nav class="sub-tabs">
  <button class="sub-tab-btn active" onclick="showSubTab('pilotage', this)">📌 Pilotage projet</button>
  <button class="sub-tab-btn" onclick="showSubTab('terrain', this)">🏟️ Activités terrain</button>
  <a href="index.html" class="sub-tabs-hub-link">🏠 Hub</a>
</nav>

<main class="suivi-page">

  <!-- ═══════════ PILOTAGE PROJET ═══════════ -->
  <section class="sub-tab-content active" id="subtab-pilotage">

    <div class="suivi-progress-wrap">
      <span class="suivi-progress-label"><span id="progressPct">0%</span> des activités terminées</span>
      <span class="suivi-progress-count" id="progressCount">(0 / 0)</span>
      <div class="suivi-progress-bar"><div class="suivi-progress-fill" id="progressFill"></div></div>
    </div>

    <div class="suivi-kpis" id="pilotageKpis"></div>

    <div class="suivi-filters">
      <select id="filterPhase" class="suivi-select" onchange="renderPilotage()">
        <option value="">Toutes les phases</option>
      </select>
      <select id="filterStatutProjet" class="suivi-select" onchange="renderPilotage()">
        <option value="">Tous les statuts</option>
        <option value="À faire">À faire</option>
        <option value="En cours">En cours</option>
        <option value="Critique">Critique</option>
        <option value="Terminé">Terminé</option>
      </select>
    </div>

    <div id="pilotageList"></div>

    <div id="pilotageAnalyse"></div>
  </section>

  <!-- ═══════════ ACTIVITÉS TERRAIN ═══════════ -->
  <section class="sub-tab-content" id="subtab-terrain">

    <div class="suivi-progress-wrap" id="terrainProgressWrap">
      <span class="suivi-progress-label"><span id="progressTerrainPct">0%</span> des activités réalisées</span>
      <span class="suivi-progress-count" id="progressTerrainCount">(0 / 0)</span>
      <div class="suivi-progress-bar"><div class="suivi-progress-fill" id="progressTerrainFill"></div></div>
    </div>

    <div class="suivi-kpis" id="terrainKpis"></div>

    <div class="suivi-filters" id="terrainFiltersWrap">
      <select id="filterZoneTerrain" class="suivi-select" onchange="renderTerrain()">
        <option value="">Toutes les zones</option>
        <option value="1">Zone 1 — Kolda & Sédhiou</option>
        <option value="2">Zone 2 — Tamba & Kédougou</option>
        <option value="3">Zone 3 — Matam</option>
      </select>
      <select id="filterCatTerrain" class="suivi-select" onchange="renderTerrain()">
        <option value="">Toutes les catégories</option>
        <option value="Sport">⚽ Sport</option>
        <option value="Culture">🎭 Culture</option>
        <option value="Citoyenneté">🤝 Citoyenneté</option>
      </select>
      <select id="filterStatutTerrain" class="suivi-select" onchange="renderTerrain()">
        <option value="">Tous les statuts</option>
        <option value="Planifiée">Planifiée</option>
        <option value="En cours">En cours</option>
        <option value="Réalisée">Réalisée</option>
      </select>
    </div>

    <div id="terrainList"></div>
  </section>

</main>

<script src="js/data-suivi.js"></script>
<script>
const LS_KEY_PROJET = 'jojtostan_suivi_projet_v1';
const GRANDES_PHASES = [
  'Pré-JOJ · Cadrage', 'Pré-JOJ · Préparation', 'Pré-JOJ · Pilote',
  'Amplification', 'Pendant JOJ', 'Post-JOJ'
];
const STATUTS_PROJET = ['À faire', 'En cours', 'Critique', 'Terminé'];
const LS_KEY_TERRAIN = 'jojtostan_suivi_terrain_v1';
const CAT_ICONS = { 'Sport': '⚽', 'Culture': '🎭', 'Citoyenneté': '🤝' };
const ZONE_LABELS = { 1: 'Zone 1 — Kolda & Sédhiou', 2: 'Zone 2 — Tamba & Kédougou', 3: 'Zone 3 — Matam' };

function showSubTab(id, btn) {
  document.querySelectorAll('.sub-tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('subtab-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'terrain') renderTerrain();
}

function loadOverridesProjet() {
  try { return JSON.parse(localStorage.getItem(LS_KEY_PROJET)) || {}; }
  catch (e) { return {}; }
}
function saveOverrideProjet(id, statut) {
  const overrides = loadOverridesProjet();
  overrides[id] = statut;
  localStorage.setItem(LS_KEY_PROJET, JSON.stringify(overrides));
}
function getActivitesProjet() {
  const overrides = loadOverridesProjet();
  return ACTIVITES_PROJET.map(a => ({ ...a, statut: overrides[a.id] || a.statut }));
}

function formatDateFr(d) {
  if (!d) return '—';
  const dt = new Date(String(d).replace(' ', 'T'));
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function populatePhaseFilter() {
  const sel = document.getElementById('filterPhase');
  GRANDES_PHASES.forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    sel.appendChild(o);
  });
}

function updateProgress(list) {
  const total = list.length;
  const done = list.filter(a => a.statut === 'Terminé').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressCount').textContent = `(${done} / ${total})`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderKpis(list) {
  const counts = { 'À faire': 0, 'En cours': 0, 'Critique': 0, 'Terminé': 0 };
  list.forEach(a => { counts[a.statut] = (counts[a.statut] || 0) + 1; });
  const wrap = document.getElementById('pilotageKpis');
  wrap.innerHTML = STATUTS_PROJET.map(statut => `
    <div class="suivi-kpi-card" style="border-color:${STATUT_PROJET_COULEURS[statut]}">
      <div class="suivi-kpi-val" style="color:${STATUT_PROJET_COULEURS[statut]}">${counts[statut] || 0}</div>
      <div class="suivi-kpi-label">${statut}</div>
    </div>`).join('');
}

function activiteCardHTML(a) {
  const color = STATUT_PROJET_COULEURS[a.statut] || '#95a5a6';
  return `
    <div class="pilotage-card">
      <div class="pilotage-card-main">
        <div class="pilotage-card-title">${a.activite}</div>
        <div class="pilotage-card-meta">
          <span>📌 ${a.phase}</span>
          <span>👤 ${a.lead}</span>
          <span>📅 ${formatDateFr(a.dateLimite)}</span>
        </div>
        <div class="pilotage-card-livrable">🎯 ${a.livrable}</div>
      </div>
      <div class="pilotage-card-side">
        <select class="pilotage-statut-select" style="border-color:${color};color:${color}"
                onchange="changerStatutProjet(${a.id}, this.value)">
          ${STATUTS_PROJET.map(s => `<option value="${s}" ${s === a.statut ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>`;
}

function renderPilotage() {
  const all = getActivitesProjet();
  updateProgress(all);
  renderKpis(all);
  buildAnalysePilotage(all);

  const phaseF = document.getElementById('filterPhase').value;
  const statutF = document.getElementById('filterStatutProjet').value;
  let filtered = all;
  if (phaseF) filtered = filtered.filter(a => a.grandePhase === phaseF);
  if (statutF) filtered = filtered.filter(a => a.statut === statutF);

  const list = document.getElementById('pilotageList');
  const html = GRANDES_PHASES.map(phase => {
    const items = filtered.filter(a => a.grandePhase === phase);
    if (!items.length) return '';
    return `
      <div class="pilotage-group">
        <h3 class="pilotage-group-title">${phase} <span class="pilotage-group-count">${items.length}</span></h3>
        ${items.map(activiteCardHTML).join('')}
      </div>`;
  }).join('');
  list.innerHTML = html || '<div class="suivi-empty">Aucune activité ne correspond aux filtres.</div>';
}

function changerStatutProjet(id, statut) {
  saveOverrideProjet(id, statut);
  renderPilotage();
}

function buildAnalysePilotage(all) {
  const total = all.length;
  const done = all.filter(a => a.statut === 'Terminé').length;
  const critique = all.filter(a => a.statut === 'Critique').length;
  const pct = total ? Math.round(done / total * 100) : 0;

  const now = new Date();
  const avecDate = all
    .filter(a => a.statut !== 'Terminé')
    .map(a => ({ ...a, _d: new Date(String(a.dateLimite).replace(' ', 'T')) }))
    .filter(a => !isNaN(a._d));
  const enRetard = avecDate.filter(a => a._d < now);
  const prochaine = avecDate.filter(a => a._d >= now).sort((a, b) => a._d - b._d)[0];

  const phaseStats = GRANDES_PHASES.map(phase => {
    const items = all.filter(a => a.grandePhase === phase);
    const doneP = items.filter(a => a.statut === 'Terminé').length;
    return { phase, total: items.length, done: doneP, pct: items.length ? Math.round(doneP / items.length * 100) : 0 };
  }).filter(p => p.total > 0);
  const phaseActuelle = phaseStats.find(p => p.pct < 100);

  let niveau = 'bon', label = '🟢 Le planning avance correctement';
  if (critique > 0 || enRetard.length > 3) {
    niveau = 'alerte'; label = '🔴 Attention immédiate requise';
  } else if (enRetard.length > 0 || (total && pct < 40)) {
    niveau = 'attention'; label = '🟠 Quelques points de vigilance';
  }

  const phrases = [
    `Sur les <strong>${total} activités</strong> du rétroplanning, <strong>${done} sont terminées (${pct}%)</strong>.`,
    phaseActuelle
      ? `Le projet se trouve actuellement dans la phase <strong>${phaseActuelle.phase}</strong> (${phaseActuelle.done}/${phaseActuelle.total} activités terminées, ${phaseActuelle.pct}%).`
      : (total ? 'Toutes les grandes phases sont complétées.' : ''),
    critique > 0
      ? `<strong>${critique} activité(s) critique(s)</strong> nécessitent un arbitrage prioritaire.`
      : 'Aucune activité critique en attente.',
    enRetard.length > 0
      ? `<strong>${enRetard.length} activité(s)</strong> ont dépassé leur date limite sans être terminées.`
      : 'Aucune activité en retard sur sa date limite.',
    prochaine
      ? `La prochaine échéance à surveiller est <strong>${prochaine.activite}</strong>, prévue le ${formatDateFr(prochaine.dateLimite)}.`
      : ''
  ].filter(Boolean);

  const wrap = document.getElementById('pilotageAnalyse');
  if (!total) {
    wrap.innerHTML = '';
    return;
  }
  wrap.innerHTML = `
    <div class="analyse-panel analyse-${niveau}">
      <div class="analyse-header">
        <span class="analyse-icon">🧠</span>
        <span class="analyse-title">Analyse du planning</span>
        <span class="analyse-status">${label}</span>
      </div>
      <p class="analyse-text">${phrases.join(' ')}</p>
      <div class="analyse-phases">
        ${phaseStats.map(p => `
          <div class="analyse-phase-row">
            <span class="analyse-phase-name">${p.phase}</span>
            <div class="analyse-phase-bar"><div class="analyse-phase-fill" style="width:${p.pct}%"></div></div>
            <span class="analyse-phase-pct">${p.done}/${p.total}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

/* ══════════ ACTIVITÉS TERRAIN ══════════ */

function loadOverridesTerrain() {
  try { return JSON.parse(localStorage.getItem(LS_KEY_TERRAIN)) || {}; }
  catch (e) { return {}; }
}
function saveOverrideTerrain(id, data) {
  const overrides = loadOverridesTerrain();
  overrides[id] = { ...(overrides[id] || {}), ...data };
  localStorage.setItem(LS_KEY_TERRAIN, JSON.stringify(overrides));
}
function getActivitesTerrain() {
  const overrides = loadOverridesTerrain();
  return ACTIVITES_TERRAIN_DEMO.map(a => ({ ...a, ...(overrides[a.id] || {}) }));
}

function updateProgressTerrain(list) {
  const total = list.length;
  const done = list.filter(a => a.statut === 'Réalisée').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressTerrainPct').textContent = pct + '%';
  document.getElementById('progressTerrainCount').textContent = `(${done} / ${total})`;
  document.getElementById('progressTerrainFill').style.width = pct + '%';
}

function renderKpisTerrain(list) {
  const prevus = list.reduce((s, a) => s + (a.participantsPrevus || 0), 0);
  const reels = list.reduce((s, a) => s + (a.statut === 'Réalisée' ? (a.participantsReels || 0) : 0), 0);
  const done = list.filter(a => a.statut === 'Réalisée').length;
  const wrap = document.getElementById('terrainKpis');
  wrap.innerHTML = `
    <div class="suivi-kpi-card" style="border-color:${STATUT_TERRAIN_COULEURS['Réalisée']}">
      <div class="suivi-kpi-val" style="color:${STATUT_TERRAIN_COULEURS['Réalisée']}">${done} / ${list.length}</div>
      <div class="suivi-kpi-label">Réalisées</div>
    </div>
    <div class="suivi-kpi-card" style="border-color:${STATUT_PROJET_COULEURS['Terminé']}">
      <div class="suivi-kpi-val" style="color:#27AE60">${reels}</div>
      <div class="suivi-kpi-label">Participants réels</div>
    </div>
    <div class="suivi-kpi-card" style="border-color:var(--gold)">
      <div class="suivi-kpi-val" style="color:var(--gold)">${prevus}</div>
      <div class="suivi-kpi-label">Participants prévus</div>
    </div>`;
}

function terrainCardHTML(a) {
  const catColor = CAT_COULEURS[a.categorie] || '#95a5a6';
  const statutColor = STATUT_TERRAIN_COULEURS[a.statut] || '#95a5a6';
  const catIcon = CAT_ICONS[a.categorie] || '•';
  return `
    <div class="terrain-card">
      <div class="terrain-card-top">
        <span class="terrain-badge" style="background:${catColor}22;color:${catColor};border-color:${catColor}66">${catIcon} ${a.categorie}</span>
        <span class="terrain-badge" style="background:${statutColor}22;color:${statutColor};border-color:${statutColor}66">${a.statut}</span>
      </div>
      <div class="terrain-card-title">${a.type}</div>
      <div class="terrain-card-meta">
        <span>📍 ${a.communaute} · ${a.region}</span>
        <span>📅 ${formatDateFr(a.date)}</span>
      </div>
      <div class="terrain-card-participants">
        <div class="tp-stat"><span class="tp-val">${a.participantsPrevus}</span><span class="tp-lbl">prévus</span></div>
        <div class="tp-stat"><span class="tp-val">${a.participantsReels || '—'}</span><span class="tp-lbl">réels</span></div>
      </div>
      <div class="terrain-card-action">
        <input type="number" min="0" class="terrain-input" id="reel-${a.id}"
               placeholder="Nb réel" value="${a.participantsReels || ''}">
        <button class="terrain-btn" onclick="marquerRealisee(${a.id})">
          ${a.statut === 'Réalisée' ? '💾 Mettre à jour' : '✅ Marquer réalisée'}
        </button>
      </div>
    </div>`;
}

function renderTerrain() {
  const all = getActivitesTerrain();

  const progressWrap = document.getElementById('terrainProgressWrap');
  const kpisWrap = document.getElementById('terrainKpis');
  const filtersWrap = document.getElementById('terrainFiltersWrap');
  const list = document.getElementById('terrainList');

  if (all.length === 0) {
    progressWrap.style.display = 'none';
    kpisWrap.style.display = 'none';
    filtersWrap.style.display = 'none';
    list.innerHTML = `
      <div class="terrain-empty-state">
        <div class="terrain-empty-icon">🎯</div>
        <p>Aucune activité terrain programmée pour le moment.<br>
        Les activités seront ajoutées lors de la phase de planification terrain,
        au fur et à mesure de leur organisation dans les communautés.</p>
      </div>`;
    return;
  }

  progressWrap.style.display = '';
  kpisWrap.style.display = '';
  filtersWrap.style.display = '';

  updateProgressTerrain(all);
  renderKpisTerrain(all);

  const zoneF = document.getElementById('filterZoneTerrain').value;
  const catF = document.getElementById('filterCatTerrain').value;
  const statutF = document.getElementById('filterStatutTerrain').value;
  let filtered = all;
  if (zoneF) filtered = filtered.filter(a => String(a.zone_id) === zoneF);
  if (catF) filtered = filtered.filter(a => a.categorie === catF);
  if (statutF) filtered = filtered.filter(a => a.statut === statutF);

  const html = [1, 2, 3].map(zid => {
    const items = filtered.filter(a => a.zone_id === zid);
    if (!items.length) return '';
    return `
      <div class="pilotage-group">
        <h3 class="pilotage-group-title">${ZONE_LABELS[zid]} <span class="pilotage-group-count">${items.length}</span></h3>
        <div class="terrain-grid">
          ${items.map(terrainCardHTML).join('')}
        </div>
      </div>`;
  }).join('');
  list.innerHTML = html || '<div class="suivi-empty">Aucune activité ne correspond aux filtres.</div>';
}

function marquerRealisee(id) {
  const input = document.getElementById('reel-' + id);
  const val = parseInt(input.value, 10);
  saveOverrideTerrain(id, {
    statut: 'Réalisée',
    participantsReels: isNaN(val) ? 0 : val
  });
  renderTerrain();
}

populatePhaseFilter();
renderPilotage();
</script>

</body>
</html>
